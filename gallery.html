<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Zeal Coders</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Gallery</h1>
        <p>Explore our training sessions, workshops, events, and student activities at Zeal Coders.</p>
    </section>

    <!-- Training Sessions -->
    <section>
        <h2>Training Sessions</h2>

        <div class="gallery-container">

            <div class="gallery-card">
                <img src="images/gallery/training1.jpg" alt="Training Session 1">
            </div>

            <div class="gallery-card">
                <img src="images/gallery/training2.jpg" alt="Training Session 2">
            </div>

        </div>
    </section>

    <!-- Workshops -->
    <section>
        <h2>Workshops</h2>

        <div class="gallery-container">

            <div class="gallery-card">
                <img src="images/gallery/workshop1.jpg" alt="Workshop 1">
            </div>

            <div class="gallery-card">
                <img src="images/gallery/workshop2.jpg" alt="Workshop 2">
            </div>

        </div>
    </section>

    <!-- Events -->
    <section>
        <h2>Events</h2>

        <div class="gallery-container">

            <div class="gallery-card">
                <img src="images/gallery/event1.jpg" alt="Event 1">
            </div>

            <div class="gallery-card">
                <img src="images/gallery/event2.jpg" alt="Event 2">
            </div>

        </div>
    </section>

    <!-- Student Activities -->
    <section>
        <h2>Student Activities</h2>

        <div class="gallery-container">

            <div class="gallery-card">
                <img src="images/gallery/activity1.jpg" alt="Student Activity 1">
            </div>

            <div class="gallery-card">
                <img src="images/gallery/activity2.jpg" alt="Student Activity 2">
            </div>

        </div>
    </section>

</body>
</html>
